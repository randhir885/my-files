<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Register</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  .card {
    background: #1e293b;
    padding: 2.5rem;
    border-radius: 12px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  h1 {
    margin: 0 0 1.5rem;
    font-size: 1.5rem;
    text-align: center;
  }
  label {
    display: block;
    margin-bottom: 0.4rem;
    font-size: 0.9rem;
    color: #94a3b8;
  }
  input {
    width: 100%;
    padding: 0.7rem;
    margin-bottom: 1rem;
    border-radius: 6px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 1rem;
  }
  button {
    width: 100%;
    padding: 0.8rem;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 0.5rem;
  }
  button:hover { background: #2563eb; }
  button:disabled { background: #475569; cursor: not-allowed; }
  .error {
    color: #f87171;
    font-size: 0.9rem;
    margin-top: 0.5rem;
    text-align: center;
    min-height: 1.2rem;
  }
  .success {
    color: #4ade80;
    font-size: 0.9rem;
    margin-top: 0.5rem;
    text-align: center;
  }
  .footer-link {
    text-align: center;
    margin-top: 1.2rem;
    font-size: 0.9rem;
  }
  .footer-link a {
    color: #60a5fa;
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Register</h1>
  <form id="registerForm">
    <label for="email">Email</label>
    <input type="email" id="email" required autocomplete="email" />

    <label for="password">Password</label>
    <input type="password" id="password" required minlength="6" autocomplete="new-password" />

    <button type="submit" id="registerBtn">Create Account</button>
    <div class="error" id="errorMsg"></div>
  </form>
  <div class="footer-link">
    Already have an account? <a href="index.html">Log in here</a>
  </div>
</div>

<script src="supabase-config.js"></script>
<script>
  const form = document.getElementById("registerForm");
  const errorMsg = document.getElementById("errorMsg");
  const registerBtn = document.getElementById("registerBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorMsg.textContent = "";
    errorMsg.className = "error";
    registerBtn.disabled = true;
    registerBtn.textContent = "Creating account...";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password,
    });

    if (error) {
      errorMsg.textContent = error.message;
      registerBtn.disabled = false;
      registerBtn.textContent = "Create Account";
      return;
    }

    errorMsg.className = "success";
    errorMsg.textContent = "Account created! Redirecting to login...";
    setTimeout(() => {
      window.location.href = "index.html";
    }, 1500);
  });
</script>

</body>
</html>
